name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lift_simulator_test
          POSTGRES_USER: lift_admin
          POSTGRES_PASSWORD: liftpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Create test database schema
      run: |
        # Wait for PostgreSQL to be ready
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U lift_admin && break
          echo "Waiting for postgres... ($i/30)"
          sleep 1
        done
        
        # Create schema with safe DDL
        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "DROP SCHEMA IF EXISTS lift_simulator CASCADE;"
        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "CREATE SCHEMA IF NOT EXISTS lift_simulator;"
        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "GRANT ALL PRIVILEGES ON SCHEMA lift_simulator TO lift_admin;"
      env:
        PGPASSWORD: liftpassword

    - name: Verify version consistency
      run: |
        POM_VERSION=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('pom.xml')
        root = tree.getroot()
        ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
        print(root.find('m:version', ns).text)
        ")
        echo "POM version: $POM_VERSION"
        FAILED=0

        if ! grep -qF "Current version: **${POM_VERSION}**" README.md; then
          echo "ERROR: README.md version does not match pom.xml ($POM_VERSION)"
          FAILED=1
        fi

        for f in docs/*.md; do
          if grep -qE 'lift-simulator-[0-9]+\.[0-9]+\.[0-9]+\.jar' "$f"; then
            if ! grep -qF "lift-simulator-${POM_VERSION}.jar" "$f"; then
              echo "ERROR: $f contains a stale JAR version (expected $POM_VERSION)"
              FAILED=1
            fi
          fi
        done

        PKG_VERSION=$(python3 -c "import json; print(json.load(open('frontend/package.json'))['version'])")
        if [ "$PKG_VERSION" != "$POM_VERSION" ]; then
          echo "ERROR: frontend/package.json version ($PKG_VERSION) != pom.xml ($POM_VERSION)"
          FAILED=1
        fi

        [ $FAILED -eq 0 ] && echo "All version references are consistent."
        exit $FAILED

    - name: Build project
      run: mvn -q clean compile

    - name: Cache OWASP Dependency-Check data
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        # Rotate the key every run so each run persists the NVD data it downloaded.
        # A fixed key is immutable once written, which previously froze a partial
        # (watchdog-killed) NVD database in the cache: every later run restored the
        # same incomplete data and could never save a completed copy. The layered
        # restore-keys load the most recent prior cache so downloads accumulate
        # across runs until one completes the initial sync.
        key: dependency-check-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          dependency-check-${{ runner.os }}-

    - name: Verify tests, coverage gate, and dependency CVE scan
      run: |
        mkdir -p thread-dumps
        # jstack -l includes lock ownership, so JVM-level deadlocks are flagged.
        dump_jvms() {
          for pid in $(pgrep -f '[j]ava'); do
            jstack -l "$pid" > "thread-dumps/$1_pid${pid}.txt" 2>&1 || true
          done
        }
        dump_db() {
          psql -h localhost -U lift_admin -d lift_simulator_test -c \
            "select pid,state,wait_event_type,wait_event,pg_blocking_pids(pid) blocked_by,left(query,200) q \
             from pg_stat_activity where datname='lift_simulator_test' order by state;" \
            > "thread-dumps/$1_db.txt" 2>&1 || true
        }
        # Watchdog: snapshot every JVM (and the DB lock graph) the moment a backend
        # statement starts waiting on a lock, so we capture the live deadlock before
        # lock_timeout aborts it. If the build stalls past the deadline, capture a
        # final set and abort so the artifact uploads before the job-level timeout.
        (
          watchdog_deadline=$((SECONDS + 2700))   # abort the build after 45 minutes
          while true; do
            sleep 10
            blocked=$(psql -tA -h localhost -U lift_admin -d lift_simulator_test \
              -c "select count(*) from pg_stat_activity where wait_event_type='Lock' and datname='lift_simulator_test';" \
              2>/dev/null || echo 0)
            if [ "${blocked:-0}" -ge 1 ]; then
              ts=$(date -u +%H%M%S)
              echo "::warning::Detected ${blocked} statement(s) waiting on a database lock; capturing dumps (lockwait_${ts})."
              dump_db "lockwait_${ts}"
              dump_jvms "lockwait_${ts}"
            fi
            if [ "$SECONDS" -ge "$watchdog_deadline" ]; then
              echo "::error::Build exceeded watchdog deadline (45m); capturing final dumps and aborting."
              ts=$(date -u +%H%M%S)
              dump_db "FINAL_${ts}"
              dump_jvms "FINAL_${ts}"
              pkill -f surefirebooter || true
              pkill -f 'org.codehaus.plexus.classworlds.launcher.Launcher' || true
              break
            fi
          done
        ) &
        WATCHDOG_PID=$!
        # With an NVD API key the OWASP scan can poll NVD quickly; without one, keep the
        # plugin's safe no-key throttle (the pom default) to avoid 403/rate-limit hangs.
        # The keyed path is required for the scan to finish inside the watchdog window.
        if [ -n "$NVD_API_KEY" ]; then
          echo "NVD_API_KEY is set; running the OWASP scan on the fast keyed path (nvd.api.delay=2000)."
          NVD_DELAY_ARG="-Dnvd.api.delay=2000"
        else
          echo "::warning::NVD_API_KEY is NOT set. The OWASP NVD update will use the slow anonymous rate limit (~20 min) and will likely hit the watchdog deadline. Add the NVD_API_KEY repository secret to fix this."
          NVD_DELAY_ARG=""
        fi
        mvn -q verify $NVD_DELAY_ARG
        RC=$?
        kill "$WATCHDOG_PID" 2>/dev/null || true
        exit $RC
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/lift_simulator_test?currentSchema=lift_simulator
        SPRING_DATASOURCE_USERNAME: lift_admin
        SPRING_DATASOURCE_PASSWORD: liftpassword
        PGPASSWORD: liftpassword
        SPRING_JPA_HIBERNATE_DDL_AUTO: update
        SPRING_JPA_PROPERTIES_HIBERNATE_HBM2DDL_CREATE_NAMESPACES: 'false'

    - name: Upload thread dumps
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: backend-thread-dumps
        path: thread-dumps/
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload JaCoCo HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-html-report
        path: target/site/jacoco/
        retention-days: 30

    - name: Check code style
      run: mvn -q checkstyle:check

    - name: Run static analysis
      run: mvn -q spotbugs:check

    - name: Package deployable JAR with frontend profile
      run: |
        echo "Activating Maven frontend profile: mvn -Pfrontend package -DskipTests"
        mvn -q -Pfrontend package -DskipTests

    - name: Verify packaged frontend assets
      run: |
        JAR_FILE=$(find target -maxdepth 1 -name 'lift-simulator-*.jar' ! -name '*.original' | head -n 1)
        test -n "$JAR_FILE"
        echo "Verifying frontend assets in $JAR_FILE"
        jar tf "$JAR_FILE" | grep '^BOOT-INF/classes/static/index.html$'
        jar tf "$JAR_FILE" | grep '^BOOT-INF/classes/static/assets/'

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Lint
      working-directory: frontend
      run: npm run lint

    - name: Unit tests
      working-directory: frontend
      run: npm run test:unit

    - name: Build
      working-directory: frontend
      run: npm run build

  e2e-playwright:
    name: Playwright E2E with backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lift_simulator_test
          POSTGRES_USER: lift_admin
          POSTGRES_PASSWORD: liftpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Playwright browsers
      working-directory: frontend
      run: npx playwright install --with-deps chromium

    - name: Package deployable JAR for E2E with frontend profile
      run: |
        echo "Activating Maven frontend profile: mvn -Pfrontend package -DskipTests"
        mvn -q -Pfrontend package -DskipTests

    - name: Verify E2E packaged frontend assets
      run: |
        JAR_FILE=$(find target -maxdepth 1 -name 'lift-simulator-*.jar' ! -name '*.original' | head -n 1)
        test -n "$JAR_FILE"
        echo "Verifying frontend assets in $JAR_FILE"
        jar tf "$JAR_FILE" | grep '^BOOT-INF/classes/static/index.html$'
        jar tf "$JAR_FILE" | grep '^BOOT-INF/classes/static/assets/'

    - name: Create E2E database schema
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U lift_admin && break
          echo "Waiting for postgres... ($i/30)"
          sleep 1
        done

        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "DROP SCHEMA IF EXISTS lift_simulator CASCADE;"
        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "CREATE SCHEMA IF NOT EXISTS lift_simulator;"
        PGPASSWORD=liftpassword psql -h localhost -U lift_admin -d lift_simulator_test -c "GRANT ALL PRIVILEGES ON SCHEMA lift_simulator TO lift_admin;"
      env:
        PGPASSWORD: liftpassword

    - name: Start backend for E2E
      run: |
        java -jar target/lift-simulator-*.jar > backend-e2e.log 2>&1 &
        echo $! > backend-e2e.pid

        for i in {1..60}; do
          if curl --fail --silent http://localhost:8080/api/v1/health > /dev/null \
              && curl --fail --silent http://localhost:8080/ | grep '<div id="root">' > /dev/null; then
            echo "Backend health check and packaged React UI are ready for Playwright E2E tests."
            exit 0
          fi
          echo "Waiting for backend health and packaged frontend UI... ($i/60)"
          sleep 2
        done

        echo "Backend failed to become ready. Last 200 log lines:"
        tail -n 200 backend-e2e.log
        exit 1
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/lift_simulator_test?currentSchema=lift_simulator
        SPRING_DATASOURCE_USERNAME: lift_admin
        SPRING_DATASOURCE_PASSWORD: liftpassword
        SPRING_JPA_HIBERNATE_DDL_AUTO: validate
        SPRING_FLYWAY_CREATE_SCHEMAS: 'true'
        ADMIN_USERNAME: admin
        ADMIN_PASSWORD: e2e-admin-password
        API_KEY: e2e-api-key
        CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
        RATE_LIMITING_ENABLED: 'false'

    - name: Run Playwright E2E tests
      working-directory: frontend
      run: npm test
      env:
        E2E_ADMIN_USERNAME: admin
        E2E_ADMIN_PASSWORD: e2e-admin-password
        E2E_API_KEY: e2e-api-key

    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: Upload Playwright test artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-test-artifacts
        path: |
          frontend/test-results/
          frontend/playwright-report/
          backend-e2e.log
        retention-days: 30
