# Application Configuration
spring:
  application:
    name: lift-config-service
  config:
    import: "optional:classpath:version.properties"
  jpa:
    open-in-view: false
  jackson:
    deserialization:
      # Jackson 3 defaults FAIL_ON_UNKNOWN_PROPERTIES to false; the API contract
      # rejects unknown request fields with HTTP 400, so re-enable it explicitly.
      fail-on-unknown-properties: true
  flyway:
    enabled: true
    schemas: lift_simulator
    default-schema: lift_simulator
    create-schemas: true

server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    com.liftsimulator: DEBUG
  file:
    name: logs/application

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true

# Simulation Configuration
simulation:
  artefacts:
    base-path: ./simulation-runs
  execution:
    max-concurrent-runs: 4
    queue-capacity: 20

# Security Configuration
# Admin credentials for HTTP Basic authentication (override in application-dev.yml or environment)
# SECURITY NOTE: Change these defaults in production!
security:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-API-Key
      - X-Requested-With
      - Accept
      - Origin
    exposed-headers:
      - WWW-Authenticate
      - Location
    allow-credentials: true
    max-age: 3600
  csrf:
    enabled: false
  openapi:
    public-access: ${SECURITY_OPENAPI_PUBLIC_ACCESS:false}

# API Authentication (runtime/simulation execution)
# SECURITY NOTE: Generate a secure random key for production!
# Override with: API_KEY environment variable
api:
  auth:
    key: ${API_KEY:}
    header: X-API-Key

# Rate Limiting Configuration
rate-limiting:
  enabled: true
  trust-forwarded-for: false
  max-buckets-per-group: 10000
  admin:
    capacity: 100
    refill-tokens: 100
    refill-period-seconds: 60
  runtime:
    capacity: 1000
    refill-tokens: 1000
    refill-period-seconds: 60

# Request Size Limits
request-size-limits:
  enabled: true
  max-body-bytes: 1048576

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  show-actuator: false
