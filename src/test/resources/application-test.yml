spring:
  datasource:
    # PostgreSQL test database with schema specified in URL
    # Can be overridden with SPRING_DATASOURCE_URL environment variable
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lift_simulator_test?currentSchema=lift_simulator}
    username: ${SPRING_DATASOURCE_USERNAME:lift_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:liftpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Fail fast on database lock waits / runaway statements instead of hanging the
      # whole CI job indefinitely. A blocked statement aborts with a clear PostgreSQL
      # error (and stack trace) after the timeout, which both unblocks CI and pinpoints
      # the contended statement. Thresholds are far above any legitimate test operation.
      connection-init-sql: "DO $$ BEGIN PERFORM set_config('lock_timeout','20s',false); PERFORM set_config('statement_timeout','120s',false); END $$;"

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Flyway owns the schema; Hibernate only validates entity mappings
      # against the migrated schema so drift is caught instead of silently
      # patched (the previous `update` mode hid migration bugs).
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: lift_simulator
        hbm2ddl:
          create_namespaces: false

  flyway:
    # Run the real V1..Vn migrations during test startup so migration bugs
    # are caught by the test suite. Schema settings are inherited from the
    # base application.yml (schemas/default-schema/create-schemas).
    enabled: true
    locations: classpath:db/migration
    schemas:
      - lift_simulator
    default-schema: lift_simulator
    create-schemas: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

api:
  auth:
    key: test-api-key
    header: X-API-Key

# Disable rate limiting in tests to prevent CI runner's shared IP from
# exhausting buckets during E2E test setup/teardown and assertion sequences.
rate-limiting:
  enabled: false

# Security configuration for tests
# Multi-user configuration with ADMIN and VIEWER roles for RBAC testing
security:
  users:
    - username: testadmin
      password: testpassword
      role: ADMIN
    - username: testviewer
      password: viewerpassword
      role: VIEWER
  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-API-Key
      - X-Requested-With
      - Accept
      - Origin
    exposed-headers:
      - WWW-Authenticate
      - Location
    allow-credentials: true
    max-age: 3600
  csrf:
    enabled: false
    ignored-paths:
      - /api/**
      - /actuator/**
  openapi:
    public-access: true
